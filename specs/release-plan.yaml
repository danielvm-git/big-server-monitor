project: bigservermonitor
version: 2.0.0
target: "2026-07-15"

description: >
  Full rewrite of PortKeeper as BigServerMonitor: native Swift 6 / SwiftUI
  macOS menubar app (MenuBarExtra, LSUIElement). Replaces the Go ECC kernel +
  Wails v2 + React 19 stack in place. Branding and UI follow the Claude Design
  handoff in specs/design-handoff/ (indigo mark, BigServerMonitor wordmark,
  native macOS popover/sheet design from PortKeeper.html).

decisions:
  - "Idiomatic Swift: actors + AsyncStream + @Observable; no ECC kernel port"
  - "Data fresh-start at ~/Library/Application Support/BigServerMonitor/"
  - "XcodeGen project.yml; App Sandbox OFF (lsof + kill required)"
  - "GRDB for SQLite; SMAppService for launch-at-login; UserNotifications"
  - "Structured JSON file logging preserved (CLAUDE.md observability contract)"

epics:
  - id: e01
    name: scaffold-and-brand
    description: "XcodeGen app target, MenuBarExtra skeleton, logo/app icon/wordmark assets"
    status: done
  - id: e02
    name: process-monitor-core
    description: "lsof polling actor, diff events, project detection, env redaction, kill"
    status: done
  - id: e03
    name: popover-ui
    description: "360pt popover: header, server rows w/ expand, projects, footer, kill confirm"
    status: done
  - id: e04
    name: health-activity-logs
    description: "HealthChecker + sheet, ActivityStore (GRDB) + sheet, LogCapture + LogsSheet w/ Copy for AI"
    status: done
  - id: e05
    name: settings-notifications
    description: "Settings sheet + JSON persistence, launch-at-login, crash notifications w/ rate limit"
    status: done
  - id: e06
    name: cutover
    description: "Delete Go/React/Wails, rewrite CLAUDE.md/CONVENTIONS/README, .gitignore, setup.sh"
    status: in_progress

milestones:
  - name: "M1: It lives in the menubar"
    epics: [e01]
    verify: "xcodebuild succeeds; app shows brand icon in menubar with popover skeleton"
  - name: "M2: Real monitoring"
    epics: [e02, e03]
    verify: "python3 -m http.server 3000 appears in popover within 5s; kill works with confirm"
  - name: "M3: Feature parity"
    epics: [e04, e05]
    verify: "health latency shown; activity persisted across relaunch; Copy for AI on pasteboard; settings persist"
  - name: "M4: Cutover shipped"
    epics: [e06]
    verify: "no .go/.tsx files remain; swift test green; PR open"

stack:
  language: swift
  version: "6.x (strict concurrency)"
  ui_framework: swiftui-menubarextra
  min_macos: "14.0"
  db: sqlite via GRDB
  test: swift-testing
  project_gen: xcodegen
  design: specs/design-handoff (BigServerMonitor logo + PortKeeper.html UI prototype)
