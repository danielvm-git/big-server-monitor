name: BigServerMonitor
options:
  bundleIdPrefix: com.danielvm
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  BigServerMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielvm.bigservermonitor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        MARKETING_VERSION: 2.0.0
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: GRDB
        product: GRDB

  BigServerMonitorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/BigServerMonitorTests
    dependencies:
      - target: BigServerMonitor
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BigServerMonitor:
    build:
      targets:
        BigServerMonitor: all
        BigServerMonitorTests: [test]
    test:
      targets:
        - BigServerMonitorTests
